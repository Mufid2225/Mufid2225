name: Generate Bomberman Contribution

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Generate Bomberman SVG
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: 'bomberman'

      - name: Commit and push
        run: |
          mkdir -p assets/contribution
          cp dist/bomberman-contribution-graph.svg assets/contribution/
          cp dist/bomberman-contribution-graph-dark.svg assets/contribution/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/contribution/
          git diff --cached --quiet || git commit -m "chore: regenerate bomberman"
          git push